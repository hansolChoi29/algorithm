name: Organize Codetree folders

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest

    steps:
      - name: Stop if commit is from GitHub Actions bot
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "Skip bot commit."
            exit 0
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move date folders into codetree
        run: |
          mkdir -p codetree

          moved=false

          for dir in [0-9][0-9][0-9][0-9][0-9][0-9]; do
            if [ -d "$dir" ]; then
              git mv "$dir" "codetree/$dir"
              moved=true
            fi
          done

          if [ "$moved" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: move codetree folders"
            git push
          else
            echo "No date folders to move."
          fi