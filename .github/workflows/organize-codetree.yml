name: Organize Codetree folders

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move date folders into codetree
        run: |
          mkdir -p codetree

          moved=false

          for dir in [0-9][0-9][0-9][0-9][0-9][0-9]; do
            if [ -d "$dir" ]; then
              mkdir -p "codetree/$dir"
              rsync -a "$dir"/ "codetree/$dir"/
              git rm -r "$dir"
              git add "codetree/$dir"
              moved=true
            fi
          done

          if [ "$moved" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: move codetree folders [skip ci]"
            git push
          else
            echo "No date folders to move."
          fi